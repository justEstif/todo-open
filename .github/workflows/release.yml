name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: tar.gz
          - goos: linux
            goarch: arm64
            ext: tar.gz
          - goos: darwin
            goarch: amd64
            ext: tar.gz
          - goos: darwin
            goarch: arm64
            ext: tar.gz
          - goos: windows
            goarch: amd64
            ext: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          version: 2026.3.3
          install: true
          cache: true

      - name: Build release archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          EXT: ${{ matrix.ext }}
        run: |
          set -euo pipefail
          mkdir -p dist

          cli_name="todoopen"
          server_name="todoopen-server"
          if [ "${GOOS}" = "windows" ]; then
            cli_name="${cli_name}.exe"
            server_name="${server_name}.exe"
          fi

          GOOS="${GOOS}" GOARCH="${GOARCH}" go build -ldflags "-X main.version=${GITHUB_REF_NAME}" -o "dist/${cli_name}" ./cmd/todoopen
          GOOS="${GOOS}" GOARCH="${GOARCH}" go build -o "dist/${server_name}" ./cmd/todoopen-server

          # build all adapters
          for adapter_dir in adapters/*/; do
            adapter_name=$(basename "$adapter_dir")
            out_name="${adapter_name}"
            if [ "${GOOS}" = "windows" ]; then
              out_name="${out_name}.exe"
            fi
            GOOS="${GOOS}" GOARCH="${GOARCH}" go build -o "dist/${out_name}" "./${adapter_dir}"
          done

          archive_base="todo-open_${GITHUB_REF_NAME}_${GOOS}_${GOARCH}"
          if [ "${EXT}" = "zip" ]; then
            (
              cd dist
              zip -q "../${archive_base}.zip" ./*
            )
          else
            tar -C dist -czf "${archive_base}.tar.gz" .
          fi

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: todo-open_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.ext }}

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist/
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
          generate_release_notes: true

  publish-npm:
    name: Publish npm packages
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Stamp version and publish
        run: |
          TAG=${{ github.ref_name }}
          VERSION=${TAG#v}

          for pkg_dir in npm/*/; do
            pkg_name=$(basename "$pkg_dir")
            tmp=$(mktemp)
            jq --arg v "$VERSION" '.version = $v' "${pkg_dir}package.json" > "$tmp"
            mv "$tmp" "${pkg_dir}package.json"
            echo "Publishing @justestif/${pkg_name}@${VERSION}..."
            cd "$pkg_dir"
            npm publish --access public --provenance
            cd - > /dev/null
          done
