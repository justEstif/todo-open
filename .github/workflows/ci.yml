name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          version: 2026.3.3
          install: true
          cache: true

      - name: Show tool versions
        run: |
          mise --version
          go version

      - name: Run CI parity tasks
        run: mise run ci
